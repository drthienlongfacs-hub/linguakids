name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish dist to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          rm -rf /tmp/linguakids-gh-pages
          git worktree add /tmp/linguakids-gh-pages origin/gh-pages
          find /tmp/linguakids-gh-pages -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +
          cp -R dist/. /tmp/linguakids-gh-pages/
          touch /tmp/linguakids-gh-pages/.nojekyll
          cd /tmp/linguakids-gh-pages
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}" || echo "No changes to commit"
          git push origin HEAD:gh-pages
          cd -
          git worktree remove /tmp/linguakids-gh-pages --force
