name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run audit:release
      - run: npm run build

      - name: Publish dist to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/linguakids-gh-pages
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add /tmp/linguakids-gh-pages origin/gh-pages
          else
            git worktree add --detach /tmp/linguakids-gh-pages
            cd /tmp/linguakids-gh-pages
            git checkout --orphan gh-pages
            cd -
          fi
          find /tmp/linguakids-gh-pages -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +
          cp -R dist/. /tmp/linguakids-gh-pages/
          touch /tmp/linguakids-gh-pages/.nojekyll
          cd /tmp/linguakids-gh-pages
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}" || echo "No changes to commit"
          git push origin HEAD:gh-pages
          cd -
          git worktree remove /tmp/linguakids-gh-pages --force

      - name: Verify live site serves new bundle
        run: node scripts/verify-live-deploy.mjs --site https://drthienlongfacs-hub.github.io/linguakids/ --dist dist/index.html --timeout-ms 900000 --interval-ms 20000
